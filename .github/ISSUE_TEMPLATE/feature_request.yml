name: 功能请求
description: 提议一个新功能或改进
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 问题背景
      description: 这个功能解决什么问题？
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的方案
      description: 你希望怎么实现
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你考虑过哪些其他方案
