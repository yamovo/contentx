name: CI

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]

# 取消同一分支上的旧运行，避免并发浪费
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Run go vet
        run: go vet ./...

      - name: Gofmt drift check
        run: |
          go fmt ./...
          git diff --exit-code -- '*.go'

      - name: Swagger drift check
        run: |
          go install github.com/swaggo/swag/cmd/swag@latest
          swag init -g cmd/server/main.go --parseDependency --parseInternal -o docs/api
          git diff --exit-code docs/api/

      - name: Run linter
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

      - name: Run tests
        run: go test ./... -v -coverprofile=coverage.out

      - name: Check coverage threshold
        run: |
          TOTAL=$(go tool cover -func=coverage.out | grep '^total:' | awk '{print $3}' | tr -d '%')
          echo "Total Go coverage: ${TOTAL}%"
          # Round 6 / F8: baseline ratchet at 75% (current ~82.9% for tested packages).
          # Prevents coverage regression; raise as more packages gain tests.
          THRESHOLD=75
          awk -v t="$TOTAL" -v th="$THRESHOLD" 'BEGIN { if (t < th) { printf "::error::Coverage %s%% below threshold %s%%\n", t, th; exit 1 } }'

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.out

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: web/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('web/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Type check
        working-directory: web
        run: npx vue-tsc --noEmit

      - name: Run tests
        working-directory: web
        run: npx vitest run --coverage

      - name: Build frontend
        working-directory: web
        run: npm run build

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [test, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build -o contentx ./cmd/server

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: contentx-linux-amd64
          path: contentx

  # ──────────────────────────────────────────────────────────────────────────
  # Docker: 多平台构建 + 推送到 GHCR
  # 触发条件：push 到 main 或打 tag
  # ──────────────────────────────────────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [test, frontend]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────────────
  # Release: 打 tag 时构建多平台二进制 + 发布 GitHub Release
  # ──────────────────────────────────────────────────────────────────────────
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [test, frontend]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build cross-platform binaries
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          mkdir -p dist
          # linux/amd64
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w -X main.version=${VERSION}" -o dist/contentx-${VERSION}-linux-amd64 ./cmd/server
          # linux/arm64
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w -X main.version=${VERSION}" -o dist/contentx-${VERSION}-linux-arm64 ./cmd/server
          # darwin/amd64
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w -X main.version=${VERSION}" -o dist/contentx-${VERSION}-darwin-amd64 ./cmd/server
          # darwin/arm64 (Apple Silicon)
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w -X main.version=${VERSION}" -o dist/contentx-${VERSION}-darwin-arm64 ./cmd/server
          # windows/amd64
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="-s -w -X main.version=${VERSION}" -o dist/contentx-${VERSION}-windows-amd64.exe ./cmd/server
          # 压缩
          cd dist
          for f in contentx-${VERSION}-linux-*; do tar -czf ${f}.tar.gz ${f}; done
          for f in contentx-${VERSION}-darwin-*; do tar -czf ${f}.tar.gz ${f}; done
          zip contentx-${VERSION}-windows-amd64.zip contentx-${VERSION}-windows-amd64.exe
          cd ..
          ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
