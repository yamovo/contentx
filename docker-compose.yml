services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: contentx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      - SERVER_MODE=release
      - SERVER_PORT=8080
      - SERVER_BASE_URL=${SERVER_BASE_URL:-http://localhost}
      - DB_DRIVER=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-contentx}
      - DB_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      - DB_NAME=${POSTGRES_DB:-contentx}
      - DB_SSL_MODE=disable
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET in .env}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
      - UPLOAD_STORAGE_PATH=/app/uploads
      - CACHE_DRIVER=redis
      - QUEUE_DRIVER=redis
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost}
      - LIMITS_API_RATE=${LIMITS_API_RATE:-300}
      - METRICS_ENABLED=true
      - OTEL_ENABLED=${OTEL_ENABLED:-false}
      - OTEL_SERVICE_NAME=contentx
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4318
      - OTEL_EXPORTER_OTLP_INSECURE=true
      - OTEL_TRACE_SAMPLE_RATIO=${OTEL_TRACE_SAMPLE_RATIO:-1.0}
    volumes:
      - uploads:/app/uploads
      - backups:/app/backups
      - logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - contentx-net

  postgres:
    image: postgres:16-alpine
    container_name: contentx-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-contentx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-contentx}
    volumes:
      - pg-data:/var/lib/postgresql/data
    # Comment out in production (don't expose DB port)
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-contentx}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - contentx-net

  redis:
    image: redis:7-alpine
    container_name: contentx-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}"]
    volumes:
      - redis-data:/data
    # Comment out in production
    # ports:
    #   - "6379:6379"
    networks:
      - contentx-net

  nginx:
    image: nginx:alpine
    container_name: contentx-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./deploy/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - app
    networks:
      - contentx-net

  # Prometheus + Grafana 监控栈（默认不启动，用 --profile monitor 启用）
  # docker-compose --profile monitor up -d
  prometheus:
    image: prom/prometheus:latest
    container_name: contentx-prometheus
    restart: unless-stopped
    profiles: ["monitor"]
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prom-data:/prometheus
    networks:
      - contentx-net

  grafana:
    image: grafana/grafana:latest
    container_name: contentx-grafana
    restart: unless-stopped
    profiles: ["monitor"]
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/contentx-dashboard.json:/var/lib/grafana/dashboards/contentx-dashboard.json:ro
    depends_on:
      - prometheus
      - tempo
    networks:
      - contentx-net

  tempo:
    image: grafana/tempo:latest
    container_name: contentx-tempo
    restart: unless-stopped
    profiles: ["monitor"]
    command: ["-config.file=/etc/tempo.yml"]
    ports:
      - "3200:3200"
      - "4318:4318"
    volumes:
      - ./deploy/tempo/tempo.yml:/etc/tempo.yml:ro
      - tempo-data:/var/tempo
    networks:
      - contentx-net

volumes:
  pg-data:
  redis-data:
  uploads:
  backups:
  logs:
  prom-data:
  grafana-data:
  tempo-data:

networks:
  contentx-net:
    driver: bridge
