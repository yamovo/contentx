version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vortexcms
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SERVER_MODE=release
      - SERVER_PORT=8080
      - SERVER_BASE_URL=${SERVER_BASE_URL:-http://localhost}
      - DB_DRIVER=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-vortexcms}
      - DB_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      - DB_NAME=${POSTGRES_DB:-vortexcms}
      - DB_SSL_MODE=disable
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET in .env}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
      - UPLOAD_STORAGE_PATH=/app/uploads
      - CACHE_DRIVER=redis
      - QUEUE_DRIVER=redis
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost}
    volumes:
      - uploads:/app/uploads
      - backups:/app/backups
      - logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - vortex-net

  postgres:
    image: postgres:16-alpine
    container_name: vortexcms-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vortexcms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-vortexcms}
    volumes:
      - pg-data:/var/lib/postgresql/data
    # Comment out in production (don't expose DB port)
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vortexcms}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vortex-net

  redis:
    image: redis:7-alpine
    container_name: vortexcms-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis-data:/data
    # Comment out in production
    # ports:
    #   - "6379:6379"
    networks:
      - vortex-net

  nginx:
    image: nginx:alpine
    container_name: vortexcms-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./deploy/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - app
    networks:
      - vortex-net

volumes:
  pg-data:
  redis-data:
  uploads:
  backups:
  logs:

networks:
  vortex-net:
    driver: bridge
