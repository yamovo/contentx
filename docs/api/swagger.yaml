      - description: Filter by type
        enum:
        - article
        - page
        in: query
        name: type
        type: string
      - description: Filter by status (empty = any)
        in: query
        name: status
        type: string
      - description: Filter by locale
        in: query
        name: locale
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page
