          schema:
            $ref: '#/definitions/internal_handlers.APIResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_handlers.APIResponse'
      security:
      - BearerAuth: []
      summary: Views over time
      tags:
      - Analytics
  /articles:
    get:
      description: Returns a paginated, filtered list of articles
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page
        in: query
        name: page_size
        type: integer
      - description: Filter by status
        enum:
        - draft
        - published
        - pending
        - scheduled
        - trash
        - archived
        in: query
        name: status
        type: string
      - description: Post type
        enum:
        - post
        - page
        in: query
        name: post_type
        type: string
      - description: Filter by category ID
        in: query
        name: category_id
        type: string
      - description: Filter by tag slug
        in: query
        name: tag
        type: string
      - description: Search keyword
        in: query
        name: search
        type: string
      - default: newest
        description: Sort order
        enum:
        - newest
        - oldest
        - most_viewed
        - most_liked
        in: query
        name: sort
        type: string
      - description: Filter by author ID
        in: query
        name: author_id
        type: string
      - description: 'Include full article body (content). Default false: list omits
          content for smaller payloads.'
        in: query
        name: full
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/internal_handlers.APIResponse'
            - properties:
                data:
                  type: object
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.APIResponse'
