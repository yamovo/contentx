host: localhost:8080
info:
  contact: {}
  description: High-performance Headless CMS - API-first content platform
  title: ContentX API
  version: "1.0"
paths:
  /admin/backup:
    get:
      description: Lists available backup files. Admin only.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.APIResponse'
      security:
      - BearerAuth: []
      summary: List backups
      tags:
      - Backup
    post:
      description: Creates a database and/or media backup. Admin only.
      parameters:
      - default: all
        description: Backup type
        enum:
        - db
        - media
        - all
        in: query
        name: type
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.APIResponse'
      security:
      - BearerAuth: []
      summary: Create backup
      tags:
      - Backup
  /admin/backup/{file}:
    delete:
      description: Deletes a backup file. Admin only.
      parameters:
      - description: Backup filename
        in: path
        name: file
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.APIResponse'
      security:
      - BearerAuth: []
      summary: Delete backup
      tags:
      - Backup
  /admin/backup/{file}/download:
    get:
      description: Downloads a backup file. Admin only.
      parameters:
      - description: Backup filename
        in: path
        name: file
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            type: file
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handlers.APIResponse'
      security:
      - BearerAuth: []
      summary: Download backup
      tags:
      - Backup
  /admin/backup/{file}/restore:
    post:
      description: Restores database or media from a backup file. Admin only. For
        SQLite the service must be restarted afterwards.
      parameters:
      - description: Backup filename
        in: path
        name: file
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.APIResponse'
      security:
      - BearerAuth: []
      summary: Restore backup
      tags:
      - Backup
  /analytics/dashboard:
    get:
      description: Returns dashboard statistics (requires analytics.view permission)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/internal_handlers.APIResponse'
            - properties:
                data:
                  type: object
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.APIResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_handlers.APIResponse'
      security:
      - BearerAuth: []
      summary: Analytics dashboard
      tags:
      - Analytics
  /analytics/devices:
    get:
      description: Returns device/browser/OS breakdown (requires analytics.view permission)
