  /search:
    get:
      description: Full-text search across articles and pages. Public endpoint returns
        only published content.
      parameters:
      - description: Search query
        in: query
        name: q
        required: true
        type: string
      - description: Filter by type
        enum:
        - article
        - page
        in: query
        name: type
        type: string
      - description: Filter by status (admin only; public callers are forced to 'published')
        enum:
        - draft
        - published
        - pending
        - scheduled
        - trash
        - archived
        in: query
        name: status
        type: string
      - description: Filter by locale (BCP-47 tag, e.g. en, zh)
        in: query
        name: locale
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/internal_handlers.APIResponse'
            - properties:
                data:
                  type: object
              type: object
      summary: Search content
      tags:
      - Search
