# Self-contained MySQL benchmark stack for the 7.2 cross-database comparison.
# The main docker-compose.yml is PostgreSQL-only, so this file stands alone
# rather than acting as an override.
#
# Usage (from repo root):
#   docker compose -f scripts/benchmark/docker-compose.mysql.yml up -d --build
#   # wait until healthy, then seed. PowerShell does not support `<` redirection,
#   # so pipe Get-Content instead (Bash users can use `mysql ... < file.sql`):
#   Get-Content scripts/benchmark/seed_mysql_10000.sql | mysql -h127.0.0.1 -P13306 -ucontentx -pbenchpass contentx
#   # run the load test. run-benchmark.ps1 now derives the default BaseUrl from
#   # -Driver (mysql -> http://127.0.0.1:18090), so -BaseUrl is optional (S1-2):
#   pwsh scripts/benchmark/run-benchmark.ps1 -Driver mysql -AdminPassword 'BenchAdmin123!'
#   docker compose -f scripts/benchmark/docker-compose.mysql.yml down -v
#
# App is published on 18090 (differs from the PostgreSQL baseline's 18080 to
# allow both stacks to run side by side) and MySQL on 13306.
#
# C3: a `bench-runner` service runs vegeta from inside a Linux container on the
# same Docker network as `app`. This eliminates the Windows client-side port
# exhaustion ("Only one usage of each socket address") that invalidated the
# historical MySQL run. Bring it up with the `bench` profile so the runner only
# starts when explicitly requested:
#   docker compose -f scripts/benchmark/docker-compose.mysql.yml --profile bench up -d --build
# The runner writes JSON to ./reports/benchmarks/raw/mysql (mounted) then exits.

services:
  app:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: contentx-bench-app
    restart: "no"
    ports:
      - "18090:8080"
    environment:
      - SERVER_MODE=release
      - SERVER_PORT=8080
      - DB_DRIVER=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=contentx
      - DB_PASSWORD=${DB_PASSWORD:-benchpass}
      - DB_NAME=contentx
      - DB_TIMEZONE=UTC
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-benchredis}
      - JWT_SECRET=${JWT_SECRET:-bench-jwt-secret-change-me-please-32chars}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-BenchAdmin123!}
      - CACHE_DRIVER=redis
      - QUEUE_DRIVER=redis
      - METRICS_ENABLED=true
      - OTEL_ENABLED=false
      # Effectively disable the per-minute API rate limiter for load testing
      # (bucket seeds this many tokens; 15k requests won't exhaust it).
      - LIMITS_API_RATE=100000000
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - bench-net

  mysql:
    image: mysql:8.4
    container_name: contentx-bench-mysql
    restart: "no"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-benchroot}
      MYSQL_DATABASE: contentx
      MYSQL_USER: contentx
      MYSQL_PASSWORD: ${DB_PASSWORD:-benchpass}
    ports:
      - "13306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-benchroot}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - bench-net

  redis:
    image: redis:7-alpine
    container_name: contentx-bench-redis
    restart: "no"
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-benchredis}"]
    networks:
      - bench-net

  bench-runner:
    profiles: ["bench"]
    build:
      context: ../..
      dockerfile: scripts/benchmark/Dockerfile.bench
    container_name: contentx-bench-runner
    restart: "no"
    # Run from inside the Docker network so traffic to `app` never crosses the
    # Windows host's network stack (no client port exhaustion).
    environment:
      - BASE_URL=http://app:8080
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-BenchAdmin123!}
      - OUTPUT_DIR=/out
      - DRIVER=mysql
      - GIT_SHA=${GIT_SHA:-unknown}
      - GIT_BRANCH=${GIT_BRANCH:-unknown}
      - READ_RATE=${READ_RATE:-1000}
      - WRITE_RATE=${WRITE_RATE:-100}
      - READ_DURATION=${READ_DURATION:-15s}
      - WRITE_DURATION=${WRITE_DURATION:-10s}
      - COOLDOWN_SECONDS=${COOLDOWN_SECONDS:-5}
    volumes:
      # JSON output lands here on the host so generate-report.ps1 can pick it up.
      - ../../reports/benchmarks/raw/mysql:/out
    depends_on:
      app:
        condition: service_started
    networks:
      - bench-net

networks:
  bench-net:
    driver: bridge
